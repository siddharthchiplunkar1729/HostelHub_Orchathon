services:
  # ── Java API (web service so Render assigns it a public URL) ──────────────
  - type: web
    name: api-java
    env: docker
    dockerfilePath: docker/api-java.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: APP_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: hostelhub-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: hostelhub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hostelhub-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hostelhub-web.onrender.com"
      - key: FRONTEND_URL
        value: "https://hostelhub-web.onrender.com"
      - key: EXPOSE_DEV_RESET_URL
        value: "false"

  # ── Angular Frontend ──────────────────────────────────────────────────────
  - type: web
    name: hostelhub-web
    env: docker
    dockerfilePath: docker/web-angular.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: API_URL
        value: "https://api-java.onrender.com"

databases:
  - name: hostelhub-db
    databaseName: hostelhub
    user: hostelhub_user
    plan: free
