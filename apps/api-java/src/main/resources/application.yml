server:
  port: ${APP_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hostelhub}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-secret-file: ${JWT_SECRET_FILE:}
    access-token-ttl: 7d
    refresh-token-ttl: 30d
    reset-token-ttl: 15m
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    frontend-base-url: ${FRONTEND_URL:http://localhost:4200}
    expose-reset-url: ${EXPOSE_DEV_RESET_URL:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
